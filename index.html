<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Separador de PDF - TP tec</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <!-- Biblioteca para manipulação de PDF no navegador -->
    <script src="https://unpkg.com/pdf-lib@1.4.0/dist/pdf-lib.min.js"></script>
    
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #131c2e;
            --border-color: #21304d;
            --primary-orange: #ff6a00;
            --secondary-orange: #ff8c33;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --secondary-blue: #60a5fa;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            color: #fff;
        }
        p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--secondary-blue);
            font-size: 0.8rem;
        }
        input[type="file"], input[type="text"] {
            width: 100%;
            padding: 10px;
            background: #0b0f19;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            font-size: 0.9rem;
        }
        input:focus {
            outline: none;
            border-color: var(--primary-orange);
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--primary-orange);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: var(--secondary-orange);
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--secondary-blue);
            text-decoration: none;
            font-size: 0.85rem;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>✂️ Separador de PDF</h1>
        <p>Selecione o arquivo e defina as páginas (ex: 1, 3, 5-8).</p>
        
        <div class="form-group">
            <label for="pdfFile">Arquivo PDF</label>
            <input type="file" id="pdfFile" accept="application/pdf">
        </div>

        <div class="form-group">
            <label for="pagesInput">Páginas a extrair</label>
            <input type="text" id="pagesInput" placeholder="Ex: 1, 3, 2-5">
        </div>

        <button id="splitBtn">Separar e Baixar PDF</button>
        
        <div>
            <a href="../index.html" class="back-link">← Voltar ao Portal Principal</a>
        </div>
    </div>

    <script>
        document.getElementById('splitBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('pdfFile');
            const pagesInput = document.getElementById('pagesInput').value.trim();

            if (!fileInput.files.length) {
                alert('Selecione um arquivo PDF primeiro.');
                return;
            }
            if (!pagesInput) {
                alert('Informe quais páginas deseja separar.');
                return;
            }

            try {
                const fileArrayBuffer = await fileInput.files[0].arrayBuffer();
                const pdfDoc = await PDFLib.PDFDocument.load(fileArrayBuffer);
                const newPdfDoc = await PDFLib.PDFDocument.create();

                const pageIndices = [];
                const parts = pagesInput.split(',');
                
                for (const part of parts) {
                    if (part.includes('-')) {
                        const [start, end] = part.split('-').map(n => parseInt(n.trim()) - 1);
                        for (let i = start; i <= end; i++) {
                            if (i >= 0 && i < pdfDoc.getPageCount()) pageIndices.push(i);
                        }
                    } else {
                        const idx = parseInt(part.trim()) - 1;
                        if (idx >= 0 && idx < pdfDoc.getPageCount()) pageIndices.push(idx);
                    }
                }

                if (pageIndices.length === 0) {
                    alert('Nenhuma página válida foi informada.');
                    return;
                }

                const copiedPages = await newPdfDoc.copyPages(pdfDoc, pageIndices);
                copiedPages.forEach(page => newPdfDoc.addPage(page));

                const pdfBytes = await newPdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'pdf-separado.pdf';
                link.click();
            } catch (err) {
                console.error(err);
                alert('Ocorreu um erro ao processar o arquivo PDF.');
            }
        });
    </script>
</body>
</html>
